<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>mymux</title>
  </head>
  <body>
    <div id="app">
      <div id="hostbar"></div>
      <header id="bar">
        <span class="dot" id="status"></span>
        <span class="title">mymux</span>
        <div id="tabs"></div>
        <!-- Toolbar icons: simple stroke geometry drawn for mymux, except the
             bell and gear which follow feather icons (MIT, feathericons.com). -->
        <button id="btn-newwin" class="barbtn" title="New window — persistent, survives restarts (⌘T in the app, ⌘K t anywhere)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3.5" y="4" width="17" height="16" rx="2.5"/><path d="M12 8.5v7M8.5 12h7"/></svg></button>
        <button id="btn-splith" class="barbtn" title="Split right"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3.5" y="4.5" width="17" height="15" rx="2.5"/><path d="M12 4.5v15"/></svg></button>
        <button id="btn-splitv" class="barbtn" title="Split down"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3.5" y="4.5" width="17" height="15" rx="2.5"/><path d="M3.5 12h17"/></svg></button>
        <button id="btn-code" class="barbtn" title="Code / diff (⌘E)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M8.5 7 3.5 12l5 5M15.5 7l5 5-5 5"/></svg></button>
        <button id="btn-proc" class="barbtn" title="Processes (⌘I in the app, ⌘K i anywhere)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12h4l2.5-6.5 5 13 2.5-6.5h4"/></svg></button>
        <button id="btn-pkgs" class="barbtn" title="Packages — language servers etc. (⌘K g)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3.5l8 4.5v8l-8 4.5-8-4.5V8l8-4.5z"/><path d="M4 8l8 4.5 8-4.5"/><path d="M12 12.5v8"/></svg></button>
        <button id="btn-notify" class="barbtn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.7 21a2 2 0 0 1-3.4 0"/></svg></button>
        <button id="btn-settings" class="barbtn" title="Settings (⌘K s)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 1 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 1 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 1 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 1 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg></button>
        <button id="btn-host" class="barbtn" title="Switch host" style="display: none"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="8.5"/><path d="M3.5 12h17M12 3.5c2.7 2.4 4 5.4 4 8.5s-1.3 6.1-4 8.5c-2.7-2.4-4-5.4-4-8.5s1.3-6.1 4-8.5z"/></svg></button>
        <span id="agents"></span>
        <span id="meta"></span>
      </header>
      <div id="term"></div>
      <div id="hint" class="hint">
        <b>⌘K</b> &nbsp;t psh · n sh · u tmux · o psh-in-dir · w close · d/r split · m zoom · k keep · b break · ,/. swap · [ ] 1–9 win · e code · i procs · j attend · / help
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
