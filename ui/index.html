<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>mymux</title>
  </head>
  <body>
    <div id="app">
      <div id="hostbar"></div>
      <header id="bar">
        <span class="dot" id="status"></span>
        <span class="title">mymux</span>
        <div id="tabs"></div>
        <button id="btn-newwin" class="barbtn" title="New window">+win</button>
        <button id="btn-splith" class="barbtn" title="Split right">▌▐</button>
        <button id="btn-splitv" class="barbtn" title="Split down">▀▄</button>
        <button id="btn-code" class="barbtn" title="Code / diff (⌘E)">code</button>
        <button id="btn-proc" class="barbtn" title="Processes (⌘K t)">ps</button>
        <button id="btn-eph" class="barbtn" title="New shell — raw, non-tmux (⌘K s)">+sh</button>
        <button id="btn-host" class="barbtn" title="Switch host" style="display: none">host</button>
        <span id="agents"></span>
        <span id="meta"></span>
      </header>
      <div id="term"></div>
      <div id="hint" class="hint">
        <b>⌘K</b> &nbsp;c new-win · x close · d/⇧d split · ←↑↓→ / hjkl move · 1–9 window · n/p next/prev · s shell · a attend · t procs · esc
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
