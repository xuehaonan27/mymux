# Release pipeline (GitHub Actions), mirroring .gitea/workflows/release.yml.
# Public repo → no billing concerns. Only this file lives under .github/:
# gitea reads .gitea/workflows, github reads this one — same thin scripts.
name: release
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch: {}

permissions:
  contents: write

env:
  PROVIDER: github
  GITEA_REPO: xuehaonan27/mymux
  GITEA_BASE: https://github.com

jobs:
  daemon-matrix:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      # Cache layout: pinned ones (named by what's inside them), recovery
      # ones (Lock-hash primary key, prefix fallback). Sizes stay tame.
      - uses: actions/cache@v4
        with:
          path: ~/.cache/mymux-ci
          key: mymux-ci-zig-0.13.0
      - uses: actions/cache@v4
        with:
          path: ~/.cargo/bin
          key: ${{ runner.os }}-cargo-bin-zigbuild-v1
      - uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-registry-
      - uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-cargo-target-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-target-

      - name: "toolchain: rust"
        run: |
          set -x
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --profile minimal --default-toolchain stable
          export PATH="$HOME/.cargo/bin:$PATH"
          # No sudo/apt anywhere: musl is linked via cargo-zigbuild (zig is
          # bootstrapped, sha256-pinned, into ~/.cache/mymux-ci).
          rustup toolchain install stable --profile minimal

      - name: build the daemon matrix (x86_64 + aarch64, musl-static)
        run: |
          export PATH="$HOME/.cargo/bin:$PATH"
          bash scripts/ci-build-daemon-matrix.sh

      - name: publish release ${{ github.ref_name }}
        env:
          TAG: ${{ github.ref_name }}
          GITEA_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          export PATH="$HOME/.cargo/bin:$PATH"
          bash scripts/ci-publish-release.sh

      # P1-18 handoff: the DMG job builds from a FRESH checkout, whose tracked
      # src-tauri/resources/daemon/bundles.json can pin an older daemon — and
      # mymux-connect's build.rs would compile that stale manifest into the
      # app. Hand the manifest + tarballs from THIS job over; the DMG job
      # verifies them against the tag before building.
      - name: hand the manifest + tarballs to the DMG job
        uses: actions/upload-artifact@v4
        with:
          name: daemon-release
          path: |
            release/artifacts/bundles.json
            release/artifacts/linux-*.tar.gz
          if-no-files-found: error
          retention-days: 1

  # macOS client package: the .dmg mac users actually install. Public repo →
  # macos-latest is free too. Serialised behind the daemon job so the release
  # it uploads into already exists (the daemon step creates it).
  client-dmg:
    needs: daemon-matrix
    runs-on: macos-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4

      # P1-18: pin the VERIFIED manifest from the daemon job (never the tracked
      # one, which may pin an older build — the equal-version sha lane would
      # then "update" hosts to that stale daemon). Fail on ANY mismatch.
      - name: fetch the daemon job's manifest + tarballs
        uses: actions/download-artifact@v4
        with:
          name: daemon-release
          path: /tmp/daemon-release
      - name: verify + pin the daemon manifest for ${{ github.ref_name }}
        env:
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import hashlib, json, os, sys

          def fail(msg):
              sys.exit(f"manifest verification FAILED: {msg}")

          tag = os.environ["TAG"]
          base = os.environ["GITEA_BASE"].rstrip("/")
          repo = os.environ["GITEA_REPO"]
          man = json.load(open("/tmp/daemon-release/bundles.json"))

          if not tag.startswith("v") or "-" not in tag[1:]:
              fail(f"ref {tag!r} is not a v<version>-<sha> tag")
          ver, sha = tag[1:].rsplit("-", 1)
          want_version = f"mymuxd {ver} ({sha})"
          if man.get("version") != want_version:
              fail(f"version {man.get('version')!r} != tag-derived {want_version!r}")
          want_base = f"{base}/{repo}/releases/download/{tag}"
          if man.get("baseUrl") != want_base:
              fail(f"baseUrl {man.get('baseUrl')!r} != {want_base!r}")
          assets = man.get("assets") or {}
          if not assets:
              fail("no assets in the manifest")
          for key, a in assets.items():
              p = f"/tmp/daemon-release/{a['name']}"
              if not os.path.exists(p):
                  fail(f"{key}: tarball {a['name']} missing from the artifact")
              h = hashlib.sha256()
              with open(p, "rb") as f:
                  for chunk in iter(lambda: f.read(1 << 20), b""):
                      h.update(chunk)
              if h.hexdigest() != a["sha256"]:
                  fail(f"{key}: sha256 {h.hexdigest()} != manifest {a['sha256']}")
              if os.path.getsize(p) != a["size"]:
                  fail(f"{key}: size {os.path.getsize(p)} != manifest {a['size']}")
          dst = "src-tauri/resources/daemon/bundles.json"
          with open(dst, "w") as f:
              json.dump(man, f, indent=2)
              f.write("\n")
          print(f"manifest verified against {tag} and pinned into {dst}")
          PY
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          # setup-node caches npm downloads + node_modules, keyed on the lock.
          cache: npm
          cache-dependency-path: ui/package-lock.json
      - uses: actions/cache@v4
        with:
          path: ~/.cargo/bin
          key: ${{ runner.os }}-cargo-bin-tauri-cli-v1
      - uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-registry-
      - uses: actions/cache@v4
        with:
          path: src-tauri/target
          key: ${{ runner.os }}-tauri-target-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-tauri-target-
      - name: "toolchain: rust + tauri-cli"
        run: |
          set -x
          if ! command -v rustup >/dev/null 2>&1; then
            curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --profile minimal --default-toolchain stable
          fi
          export PATH="$HOME/.cargo/bin:$PATH"
          if ! cargo tauri --version >/dev/null 2>&1; then
            cargo install tauri-cli --locked --version '^2'
          fi
          # $HOME/.cargo/bin lands on PATH for this step and every later one
          # (env.HOME as ${{ env.HOME }} is EMPTY in expressions — PATH must
          # be extended this way, not via a run-level env override).
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
      - name: build mymux.dmg (ad-hoc signed by cargo tauri build)
        run: cargo tauri build
      # Post-build proof for P1-18: the manifest is include_str!'d into the
      # binary, so its asset sha must be grep-able in the SHIPPED app bundle
      # (the raw binary is `mymux-app` per Cargo.toml, not `mymux` — probe
      # the bundle, which also covers the bundling step itself).
      - name: assert the built app embeds the verified manifest
        run: |
          set -euo pipefail
          SHA="$(python3 -c 'import json; m=json.load(open("src-tauri/resources/daemon/bundles.json")); print(next(iter(m["assets"].values()))["sha256"])')"
          BIN="$(ls src-tauri/target/release/bundle/macos/mymux.app/Contents/MacOS/* | head -1)"
          [ -n "$BIN" ] && [ -f "$BIN" ] || { echo "app binary missing inside mymux.app"; exit 1; }
          grep -q "$SHA" "$BIN" \
            && echo "OK: $BIN embeds the verified manifest" \
            || { echo "FAIL: $BIN does not embed the verified manifest"; exit 1; }
      - name: upload .dmg to the release (gh on runners reads GH_TOKEN)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          set -e
          shopt -s nullglob
          dmgs=( src-tauri/target/release/bundle/dmg/*.dmg )
          [ ${#dmgs[@]} -gt 0 ] || { echo "no .dmg produced"; exit 1; }
          for f in "${dmgs[@]}"; do
            gh release upload "$TAG" "$f" --clobber
          done
