# Release pipeline (GitHub Actions), mirroring .gitea/workflows/release.yml.
# Public repo → no billing concerns. Only this file lives under .github/:
# gitea reads .gitea/workflows, github reads this one — same thin scripts.
name: release
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch: {}

permissions:
  contents: write

env:
  PROVIDER: github
  GITEA_REPO: xuehaonan27/mymux
  GITEA_BASE: https://github.com

jobs:
  daemon-matrix:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      # Cache layout: pinned ones (named by what's inside them), recovery
      # ones (Lock-hash primary key, prefix fallback). Sizes stay tame.
      - uses: actions/cache@v4
        with:
          path: ~/.cache/mymux-ci
          key: mymux-ci-zig-0.13.0
      - uses: actions/cache@v4
        with:
          path: ~/.cargo/bin
          key: ${{ runner.os }}-cargo-bin-zigbuild-v1
      - uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-registry-
      - uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-cargo-target-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-target-

      - name: "toolchain: rust"
        run: |
          set -x
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --profile minimal --default-toolchain stable
          export PATH="$HOME/.cargo/bin:$PATH"
          # No sudo/apt anywhere: musl is linked via cargo-zigbuild (zig is
          # bootstrapped, sha256-pinned, into ~/.cache/mymux-ci).
          rustup toolchain install stable --profile minimal

      - name: build the daemon matrix (x86_64 + aarch64, musl-static)
        run: |
          export PATH="$HOME/.cargo/bin:$PATH"
          bash scripts/ci-build-daemon-matrix.sh

      - name: publish release ${{ github.ref_name }}
        env:
          TAG: ${{ github.ref_name }}
          GITEA_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          export PATH="$HOME/.cargo/bin:$PATH"
          bash scripts/ci-publish-release.sh

  # macOS client package: the .dmg mac users actually install. Public repo →
  # macos-latest is free too. Serialised behind the daemon job so the release
  # it uploads into already exists (the daemon step creates it).
  client-dmg:
    needs: daemon-matrix
    runs-on: macos-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          # setup-node caches npm downloads + node_modules, keyed on the lock.
          cache: npm
          cache-dependency-path: ui/package-lock.json
      - uses: actions/cache@v4
        with:
          path: ~/.cargo/bin
          key: ${{ runner.os }}-cargo-bin-tauri-cli-v1
      - uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-registry-
      - uses: actions/cache@v4
        with:
          path: src-tauri/target
          key: ${{ runner.os }}-tauri-target-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-tauri-target-
      - name: "toolchain: rust + tauri-cli"
        run: |
          set -x
          if ! command -v rustup >/dev/null 2>&1; then
            curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --profile minimal --default-toolchain stable
          fi
          export PATH="$HOME/.cargo/bin:$PATH"
          if ! cargo tauri --version >/dev/null 2>&1; then
            cargo install tauri-cli --locked --version '^2'
          fi
          # $HOME/.cargo/bin lands on PATH for this step and every later one
          # (env.HOME as ${{ env.HOME }} is EMPTY in expressions — PATH must
          # be extended this way, not via a run-level env override).
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
      - name: build mymux.dmg (ad-hoc signed by cargo tauri build)
        run: cargo tauri build
      - name: upload .dmg to the release (gh on runners reads GH_TOKEN)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          set -e
          shopt -s nullglob
          dmgs=( src-tauri/target/release/bundle/dmg/*.dmg )
          [ ${#dmgs[@]} -gt 0 ] || { echo "no .dmg produced"; exit 1; }
          for f in "${dmgs[@]}"; do
            gh release upload "$TAG" "$f" --clobber
          done
