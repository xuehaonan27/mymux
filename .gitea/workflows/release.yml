# Release pipeline (Gitea Actions, instance: gitea.aka.cy)
#
# Trigger: pushing a tag (v*). The SAME two scripts run locally —
# .gitea/workflows stays thin by design; heavy lifting lives in
# scripts/ci-build-daemon-matrix.sh and scripts/ci-publish-release.sh.
#
# Runner layout: the matrix runs on the performant runner (label: k3s-runner
# — name vs label matter; rui.ke was the runner's NAME, its label is
# k3s-runner, confirmed by the user).
#
# Secrets needed on the repo: MYMUX_RELEASE_TOKEN (a user's api token with
# write:repository — repo secrets CANNOT be named GITEA_TOKEN: the GITEA_
# prefix is reserved for the instance's built-in variables).
name: release
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch: {}

env:
  GITEA_REPO: doublefire.chen/mymux
  GITEA_BASE: https://gitea.aka.cy

jobs:
  daemon-matrix:
    runs-on: [k3s-runner]
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      # x86_64 via system musl-gcc from the base image; aarch64 via
      # cargo-zigbuild. The script bootstraps everything else (rustup not
      # assumed: installed on the fly when missing).
      - name: "toolchain: rust"
        run: |
          set -x
          if ! command -v rustup >/dev/null 2>&1; then
            curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --profile minimal --default-toolchain stable
          fi
          export PATH="$HOME/.cargo/bin:$PATH"
          # NO apt here on purpose: this runner's apt hangs silently (dpkg
          # lock/DNS mirror); the matrix links musl via cargo-zigbuild for
          # BOTH arches, so no system packages are needed at all.
          rustup toolchain install stable --profile minimal

      - name: build the daemon matrix (x86_64 + aarch64, musl-static)
        run: |
          export PATH="$HOME/.cargo/bin:$PATH"
          bash scripts/ci-build-daemon-matrix.sh

      - name: publish release ${{ github.ref_name }}
        env:
          TAG: ${{ github.ref_name }}
          # Built-in GITEA_TOKEN can CREATE the release but asset UPLOAD is
          # denied on this instance (exit 22/403, run 7796). The admin sets
          # MYMUX_RELEASE_TOKEN (their own PAT, write:repository) on this repo
          # and we use it for the whole publish step.
          GITEA_TOKEN: ${{ secrets.MYMUX_RELEASE_TOKEN }}
        run: |
          export PATH="$HOME/.cargo/bin:$PATH"
          bash scripts/ci-publish-release.sh

