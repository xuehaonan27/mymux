# Release pipeline (Gitea Actions, instance: gitea.aka.cy)
#
# Trigger: pushing a tag (v*). The SAME two scripts run locally —
# .gitea/workflows stays thin by design; heavy lifting lives in
# scripts/ci-build-daemon-matrix.sh and scripts/ci-publish-release.sh.
#
# Runner layout: the matrix runs on the performant runner (label: rui.ke,
# per the user) — edit here if labels change (labels, not names, pick).
#
# Secrets needed on the repo: GITEA_TOKEN (write:repository) — release
# creation + asset upload ride it, verified working 2026-07-16.
name: release
on:
  push:
    tags:
      - 'v*'

env:
  GITEA_REPO: XueHaonan/mymux
  GITEA_BASE: https://gitea.aka.cy

jobs:
  daemon-matrix:
    runs-on: [rui.ke]
    steps:
      - uses: actions/checkout@v4

      # x86_64 via system musl-gcc from the base image; aarch64 via
      # cargo-zigbuild. The script bootstraps everything else (rustup not
      # assumed: installed on the fly when missing).
      - name: toolchain: rust + musl-tools
        run: |
          set -e
          if ! command -v rustup >/dev/null 2>&1; then
            curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --profile minimal
          fi
          export PATH="$HOME/.cargo/bin:$PATH"
          sudo apt-get update -qq
          sudo apt-get install -y -qq musl-tools
          rustup toolchain install stable --profile minimal

      - name: build the daemon matrix (x86_64 + aarch64, musl-static)
        run: |
          export PATH="$HOME/.cargo/bin:$PATH"
          bash scripts/ci-build-daemon-matrix.sh

      - name: publish release ${{ github.ref_name }}
        env:
          TAG: ${{ github.ref_name }}
          GITEA_TOKEN: ${{ secrets.GITEA_TOKEN }}
        run: |
          export PATH="$HOME/.cargo/bin:$PATH"
          bash scripts/ci-publish-release.sh
